name: Auto Label Issues
on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Label issues
        uses: actions/github-script@v7
        if: github.event_name == 'issues'
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body.toLowerCase();
            const title = issue.title.toLowerCase();
            const labels = [];
            
            // Detect bug
            if (body.includes('bug') || title.includes('bug') || body.includes('error') || body.includes('crash')) {
              labels.push('bug');
            }
            
            // Detect feature
            if (body.includes('feature') || title.includes('feature') || title.includes('request') || body.includes('would be nice')) {
              labels.push('enhancement');
            }
            
            // Detect documentation
            if (body.includes('doc') || title.includes('doc') || body.includes('readme')) {
              labels.push('documentation');
            }
            
            // Detect question
            if (title.includes('how') || title.includes('?') || title.includes('help')) {
              labels.push('question');
            }
            
            // Label with default
            if (labels.length === 0) {
              labels.push('triage');
            }
            
            if (labels.length > 0) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }

      - name: Label pull requests
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body.toLowerCase();
            const title = pr.title.toLowerCase();
            const files = context.payload.pull_request.added_files || [];
            const labels = [];
            
            // Detect type by changed files
            if (files.some(f => f.endsWith('.yml') || f.endsWith('.yaml'))) {
              labels.push('ci/cd');
            }
            if (files.some(f => f.endsWith('.md'))) {
              labels.push('documentation');
            }
            if (files.some(f => f.startsWith('src/'))) {
              labels.push('enhancement');
            }
            
            // Detect by title
            if (body.includes('fix') || title.includes('fix') || title.includes('bug')) {
              labels.push('bug');
            }
            
            // Default label
            if (labels.length === 0) {
              labels.push('enhancement');
            }
            
            if (labels.length > 0) {
              github.rest.pulls.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                labels: labels
              });
            }